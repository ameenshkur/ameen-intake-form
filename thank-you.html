<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --accent: #0d9488;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --font-body: 'Outfit', sans-serif;
      --font-heading: 'Syne', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
    }

    .card {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    .confirmation-group {
      display: grid;
      justify-items: center;
    }

    .check-icon {
      position: relative;
      width: 62px;
      height: 62px;
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      transform-origin: center;
      animation: successBadgeSettle 680ms cubic-bezier(0.2, 0.9, 0.18, 1) both;
    }
    .success-layer {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.08);
      transform-origin: center;
      will-change: transform, opacity;
    }
    .success-layer.is-outer {
      width: 74px;
      height: 74px;
      background: #ccfbf1;
      animation: successOuterLayer 620ms cubic-bezier(0.18, 0.9, 0.2, 1) both;
    }
    .success-layer.is-middle {
      width: 58px;
      height: 58px;
      background: #5eead4;
      box-shadow: 0 12px 24px rgba(13, 148, 136, 0.13);
      animation: successMiddleLayer 620ms cubic-bezier(0.18, 0.9, 0.2, 1) both;
    }
    .success-layer.is-inner {
      width: 44px;
      height: 44px;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(13, 148, 136, 0.28);
      animation: successInnerLayer 620ms cubic-bezier(0.18, 0.9, 0.2, 1) both;
    }
    .check-icon svg {
      position: relative;
      z-index: 1;
      width: 25px;
      height: 25px;
      color: #ffffff;
      overflow: visible;
      filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      animation: successGlow 420ms ease-out 610ms both;
    }
    .check-icon path {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      opacity: 0;
      animation: successDraw 420ms cubic-bezier(0.26, 0, 0.12, 1) 600ms both;
    }

    .confirmation-group,
    .divider,
    .next-steps,
    .contact-action {
      animation: contentFadeUp 500ms ease-out 360ms both;
    }

    @keyframes successBadgeSettle {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.92);
      }
      58% {
        opacity: 1;
        transform: translateY(-2px) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes successOuterLayer {
      0% {
        opacity: 0;
        transform: scale(0.08);
      }
      18% {
        opacity: 0.95;
        transform: scale(0.42);
      }
      50% {
        opacity: 1;
        transform: scale(1.34);
      }
      78% {
        opacity: 0.3;
        transform: scale(1.06);
      }
      100% {
        opacity: 0;
        transform: scale(0.82);
      }
    }

    @keyframes successMiddleLayer {
      0% {
        opacity: 0;
        transform: scale(0.08);
      }
      20% {
        opacity: 0.95;
        transform: scale(0.46);
      }
      52% {
        opacity: 1;
        transform: scale(1.22);
      }
      82% {
        opacity: 0.44;
        transform: scale(0.98);
      }
      100% {
        opacity: 0;
        transform: scale(0.78);
      }
    }

    @keyframes successInnerLayer {
      0% {
        opacity: 0;
        transform: scale(0.08);
      }
      22% {
        opacity: 1;
        transform: scale(0.5);
      }
      52% {
        opacity: 1;
        transform: scale(1.2);
      }
      78% {
        opacity: 1;
        transform: scale(0.96);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes successDraw {
      0% {
        stroke-dashoffset: 30;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    @keyframes successGlow {
      0% {
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      }
      48% {
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.62));
      }
      100% {
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      }
    }

    @keyframes contentFadeUp {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .check-icon,
      .check-icon svg,
      .success-layer,
      .check-icon path,
      .confirmation-group,
      .divider,
      .next-steps,
      .contact-action {
        animation: none;
      }
      .check-icon path {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      .success-layer {
        opacity: 1;
        transform: none;
      }
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--text);
    }

    .body-text {
      color: var(--muted);
      font-size: 15px;
      max-width: 460px;
      margin: 28px auto 14px;
    }

    .signature {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
    }

    .contact-action {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 14px;
    }

    .contact-action[hidden] {
      display: none;
    }

    .contact-action a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid rgba(13, 148, 136, 0.35);
      border-radius: 999px;
      color: var(--accent);
      background: #ffffff;
      font-weight: 600;
      text-decoration: none;
    }

    .contact-action a:focus-visible {
      outline: 3px solid rgba(13, 148, 136, 0.25);
      outline-offset: 3px;
    }

    .qr-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.68);
    }

    .qr-modal[hidden] {
      display: none;
    }

    .qr-dialog {
      position: relative;
      width: min(100%, 440px);
      padding: 22px;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
      text-align: center;
    }

    .qr-dialog h2 {
      font-family: var(--font-heading);
      font-size: 20px;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .qr-dialog p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
      white-space: nowrap;
    }

    .qr-dialog img {
      display: block;
      width: min(100%, 260px);
      height: auto;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .qr-close {
      position: absolute;
      top: 10px;
      inset-inline-end: 10px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .qr-close:focus-visible {
      outline: 3px solid rgba(13, 148, 136, 0.25);
      outline-offset: 3px;
    }

    .divider {
      width: min(100%, 720px);
      height: 1px;
      background: var(--border);
      margin: 24px auto 0;
    }

    .next-steps {
      margin-top: 24px;
      text-align: start;
    }

    .next-steps h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      line-height: 1.3;
      text-align: center;
      margin-bottom: 18px;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .step-card {
      position: relative;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 16px;
      align-items: center;
      min-height: 132px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    .step-card.is-complete {
      border-color: rgba(13, 148, 136, 0.28);
      background: #f8fbfa;
    }

    .step-illustration {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      overflow: hidden;
    }

    .step-illustration img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      display: block;
    }

    .step-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .step-dot {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 999px;
      background: #ccfbf1;
      color: var(--accent);
      font-size: 12px;
      line-height: 1;
    }

    .is-complete .step-dot {
      width: 26px;
      height: 26px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
    }

    .step-card h3 {
      font-family: var(--font-heading);
      font-size: 17px;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .step-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (min-width: 768px) {
      body {
        align-items: flex-start;
        font-size: 18px;
        padding: 50px 40px 14px;
      }

      .card {
        max-width: 1040px;
      }

      .check-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 18px;
      }
      .check-icon svg {
        width: 26px;
        height: 26px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 4px;
      }

      .body-text {
        font-size: 17px;
        line-height: 1.5;
        max-width: 880px;
        margin-top: 8px;
        margin-bottom: 8px;
      }

      .signature {
        font-size: 18px;
      }

      .contact-action {
        font-size: 15px;
        margin-top: 30px;
      }

      .divider {
        margin: 32px auto 0;
      }

      .next-steps {
        margin-top: 20px;
      }

      .next-steps h2 {
        font-size: 22px;
        margin-bottom: 14px;
      }

      .steps-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
      }

      .step-card {
        grid-template-columns: 1fr;
        align-content: start;
        min-height: 276px;
        padding: 20px;
      }

      .step-illustration {
        aspect-ratio: 16 / 9.4;
      }

      .step-illustration img {
        width: 82%;
        height: 82%;
      }

      .step-kicker {
        margin-bottom: 5px;
        font-size: 11px;
      }

      .step-card h3 {
        font-size: 18px;
        margin-bottom: 7px;
      }

      .step-card p {
        font-size: 14px;
        line-height: 1.45;
      }
    }

    @media (min-width: 768px) and (max-height: 760px) {
      body {
        align-items: flex-start;
        padding-top: 30px;
        padding-bottom: 14px;
      }

      .check-icon {
        width: 56px;
        height: 56px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 4px;
      }

      .body-text {
        font-size: 16px;
        line-height: 1.42;
        margin-top: 9px;
        margin-bottom: 10px;
      }

      .divider {
        margin: 18px auto;
      }

      .next-steps {
        margin-top: 14px;
      }

      .step-card {
        min-height: 208px;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .step-card {
        grid-template-columns: 76px 1fr;
        gap: 12px;
        padding: 12px;
      }
      .qr-dialog p {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-icon">
      <span class="success-layer is-outer" aria-hidden="true"></span>
      <span class="success-layer is-middle" aria-hidden="true"></span>
      <span class="success-layer is-inner" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 12.4l4.6 4.6L19.8 6.6"></path>
      </svg>
    </div>
    <div class="confirmation-group">
      <h1 id="ty-title"></h1>
      <p class="body-text" id="ty-body"></p>
      <p class="signature" id="ty-signature"></p>
    </div>
    <div class="divider"></div>

    <section class="next-steps" aria-labelledby="next-steps-title">
      <h2 id="next-steps-title"></h2>
      <div class="steps-grid">
        <article class="step-card is-complete">
          <div class="step-illustration">
            <img src="assets/img/undraw-digital-signature.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">✓</span>
              <span id="step-1-kicker"></span>
            </div>
            <h3 id="step-1-title"></h3>
            <p id="step-1-body"></p>
          </div>
        </article>
        <article class="step-card">
          <div class="step-illustration">
            <img src="assets/img/undraw-reviewing-design.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">2</span>
              <span id="step-2-kicker"></span>
            </div>
            <h3 id="step-2-title"></h3>
            <p id="step-2-body"></p>
          </div>
        </article>
        <article class="step-card">
          <div class="step-illustration">
            <img src="assets/img/undraw-finding-the-way.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">3</span>
              <span id="step-3-kicker"></span>
            </div>
            <h3 id="step-3-title"></h3>
            <p id="step-3-body"></p>
          </div>
        </article>
      </div>
    </section>

    <div class="contact-action" id="contact-action" hidden>
      <span id="contact-text"></span>
      <a id="contact-link" href="index.html"></a>
    </div>
  </div>

  <div class="qr-modal" id="wechat-modal" hidden>
    <div class="qr-dialog" role="dialog" aria-modal="true" aria-labelledby="wechat-modal-title">
      <button class="qr-close" id="wechat-modal-close" type="button" aria-label="Close">&times;</button>
      <h2 id="wechat-modal-title"></h2>
      <p id="wechat-modal-body"></p>
      <img id="wechat-modal-image" src="" alt="" />
    </div>
  </div>

  <script>
    const LANGS = { en: {}, ar: {}, zh: {} };
    const THANK_YOU_CONTEXT_KEY = 'ameen_intake_thank_you_context_v1';
    // Fill these when you want the thank-you CTA to open a specific chat app.
    const DIRECT_CONTACT = {
      email: 'ameenshkur@gmail.com',
      whatsapp: '+9647719541390',
      telegram: '@AmeenShkur',
      wechat: 'https://ameenshkur.github.io/assets/contact/wechat-qr.png',
      other: '+9647719541390'
    };

    async function init() {
      const params = new URLSearchParams(window.location.search);
      let lang = params.get('lang') || localStorage.getItem('intake_lang') || 'en';
      if (!['en', 'ar', 'zh'].includes(lang)) lang = 'en';

      let strings = {};
      try {
        const res = await fetch(`assets/lang/${lang}.json`);
        strings = await res.json();
      } catch {
        try {
          const res = await fetch('assets/lang/en.json');
          strings = await res.json();
        } catch { /* use fallback text */ }
      }

      const meta = strings._meta || {};
      const bodyFont = meta.font_family || "'Outfit', sans-serif";
      const headingFont = lang === 'en' ? "'Syne', sans-serif" : bodyFont;
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', meta.dir || 'ltr');
      document.documentElement.style.setProperty('--font-body', bodyFont);
      document.documentElement.style.setProperty('--font-heading', headingFont);
      document.body.style.fontFamily = bodyFont;
      document.title = strings.thank_you_title || 'Thank You';
      const context = getThankYouContext(params);

      document.getElementById('ty-title').textContent =
        getThankYouTitle(strings, context);
      document.getElementById('ty-body').textContent =
        getThankYouBody(strings, context);
      document.getElementById('ty-signature').textContent =
        strings.thank_you_signature || '— Ameen / امين / ئەمین / 阿明';
      renderContactAction(strings, lang, context);

      document.getElementById('next-steps-title').textContent =
        strings.thank_you_steps_title || 'What happens next';
      const steps = [
        {
          kicker: strings.thank_you_step_1_kicker || 'Completed',
          title: strings.thank_you_step_1_title || 'Intake form submitted',
          body: strings.thank_you_step_1_body || 'Your answers have been received and saved for review.'
        },
        {
          kicker: strings.thank_you_step_2_kicker || 'Next',
          title: getServiceReviewTitle(strings, context),
          body: getStrategyReviewBody(strings, context)
        },
        {
          kicker: strings.thank_you_step_3_kicker || 'Then',
          title: strings.thank_you_step_3_title || 'Strategy direction',
          body: getStrategyDirectionBody(strings, context)
        }
      ];

      steps.forEach((step, index) => {
        const number = index + 1;
        document.getElementById(`step-${number}-kicker`).textContent = step.kicker;
        document.getElementById(`step-${number}-title`).textContent = step.title;
        document.getElementById(`step-${number}-body`).textContent = step.body;
      });
    }

    function getThankYouContext(params) {
      let stored = {};
      try {
        stored = JSON.parse(localStorage.getItem(THANK_YOU_CONTEXT_KEY) || '{}');
      } catch {
        stored = {};
      }

      const methodValue = cleanValue(stored.contactMethodValue || params.get('contact_type'));
      const methodLabel = cleanContactMethodLabel(stored.contactMethod || params.get('contact'), methodValue);

      return {
        name: cleanValue(stored.name || params.get('name')),
        company: cleanValue(stored.company || params.get('company')),
        market: cleanValue(stored.market || params.get('market')),
        audience: cleanValue(stored.audience || params.get('audience')),
        goal: cleanValue(stored.goal || params.get('goal')),
        goalLabel: cleanValue(stored.goalLabel || params.get('service')),
        contactMethodValue: methodValue,
        contactMethod: methodLabel
      };
    }

    function cleanValue(value) {
      return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 120);
    }

    function cleanContactMethodLabel(value, methodValue) {
      const label = cleanValue(value);
      if (!methodValue || /^[-—\s]*select[-—\s]*$/i.test(label)) return '';
      return label;
    }

    function fillTemplate(template, values) {
      return String(template || '').replace(/\{(\w+)\}/g, (_, key) => values[key] || '');
    }

    function getThankYouTitle(strings, context) {
      if (context.name) {
        return fillTemplate(
          strings.thank_you_title_named || 'Thanks, {name} — we’ve received your intake.',
          { name: context.name }
        );
      }
      return strings.thank_you_title || 'Thanks — we’ve received your intake.';
    }

    function getThankYouBody(strings, context) {
      if (context.company && context.market) {
        return fillTemplate(strings.thank_you_body_company_market, context);
      }
      if (context.company) {
        return fillTemplate(strings.thank_you_body_company, context);
      }
      if (context.market) {
        return fillTemplate(strings.thank_you_body_market, context);
      }
      return strings.thank_you_body || "We'll review everything carefully and come back to you soon.";
    }

    function getServiceReviewTitle(strings, context) {
      const key = context.goal ? `thank_you_service_title_${context.goal}` : '';
      return strings[key] || strings.thank_you_step_2_title || 'Marketing strategy review';
    }

    function getStrategyReviewBody(strings, context) {
      if (context.market && context.audience) {
        return strings.thank_you_step_2_body_market_audience || strings.thank_you_step_2_body;
      }
      if (context.market) {
        return fillTemplate(strings.thank_you_step_2_body_market, context);
      }
      if (context.audience) {
        return strings.thank_you_step_2_body_audience || strings.thank_you_step_2_body;
      }
      return strings.thank_you_step_2_body || 'We review your market, audience, and goals, then follow up if needed.';
    }

    function getStrategyDirectionBody(strings, context) {
      if (context.company) {
        return fillTemplate(strings.thank_you_step_3_body_company, context);
      }
      if (context.market) {
        return fillTemplate(strings.thank_you_step_3_body_market, context);
      }
      return strings.thank_you_step_3_body || 'We share the strongest marketing direction and next steps.';
    }

    function renderContactAction(strings, lang, context) {
      const wrap = document.getElementById('contact-action');
      const text = document.getElementById('contact-text');
      const link = document.getElementById('contact-link');
      if (!wrap || !text || !link) return;

      const methodKey = getContactMethodKey(context.contactMethodValue);
      const action = getDirectContactAction(strings, methodKey);
      text.textContent = action.text;
      link.textContent = action.button;
      link.href = action.href;
      link.target = action.external ? '_blank' : '';
      link.rel = action.external ? 'noopener' : '';
      link.dataset.modalImage = action.modalImage || '';
      setupWeChatModal(strings);
      wrap.hidden = false;
    }

    function getContactMethodKey(value) {
      const allowed = ['whatsapp', 'wechat', 'telegram', 'email_only', 'other'];
      return allowed.includes(value) ? value : '';
    }

    function getDirectContactAction(strings, methodKey) {
      const fallbackEmail = DIRECT_CONTACT.email;
      const fallbackHref = getMailHref(fallbackEmail);
      const fallback = {
        text: strings.thank_you_direct_contact_text || 'Have something else to say? Contact me directly.',
        button: strings.thank_you_direct_contact_button || 'Contact me directly',
        href: fallbackHref,
        external: false
      };

      if (methodKey === 'whatsapp' && DIRECT_CONTACT.whatsapp) {
        return {
          text: strings.thank_you_direct_contact_text_whatsapp || fallback.text,
          button: strings.thank_you_direct_contact_button_whatsapp || fallback.button,
          href: getWhatsAppHref(DIRECT_CONTACT.whatsapp),
          external: true
        };
      }
      if (methodKey === 'telegram' && DIRECT_CONTACT.telegram) {
        return {
          text: strings.thank_you_direct_contact_text_telegram || fallback.text,
          button: strings.thank_you_direct_contact_button_telegram || fallback.button,
          href: getTelegramHref(DIRECT_CONTACT.telegram),
          external: true
        };
      }
      if (methodKey === 'wechat' && DIRECT_CONTACT.wechat) {
        return {
          text: strings.thank_you_direct_contact_text_wechat || fallback.text,
          button: strings.thank_you_direct_contact_button_wechat || fallback.button,
          href: DIRECT_CONTACT.wechat,
          external: false,
          modalImage: DIRECT_CONTACT.wechat
        };
      }
      if (methodKey === 'email_only' && fallbackEmail) {
        return {
          text: strings.thank_you_direct_contact_text_email_only || fallback.text,
          button: strings.thank_you_direct_contact_button_email_only || fallback.button,
          href: fallbackHref,
          external: false
        };
      }
      if (methodKey === 'other' && DIRECT_CONTACT.other) {
        return {
          text: strings.thank_you_direct_contact_text_other || fallback.text,
          button: strings.thank_you_direct_contact_button_other || fallback.button,
          href: getWhatsAppHref(DIRECT_CONTACT.other),
          external: true
        };
      }
      return fallback;
    }

    function getMailHref(email) {
      const subject = encodeURIComponent('Extra details about my intake');
      const body = encodeURIComponent('Hi Ameen,\n\nI wanted to add:');
      return `mailto:${email}?subject=${subject}&body=${body}`;
    }

    function getWhatsAppHref(phone) {
      const cleanPhone = phone.replace(/[^\d]/g, '');
      const text = encodeURIComponent('Hi Ameen, I wanted to add something about my intake.');
      return `https://wa.me/${cleanPhone}?text=${text}`;
    }

    function getTelegramHref(username) {
      return `https://t.me/${username.replace(/^@/, '')}`;
    }

    function setupWeChatModal(strings) {
      const link = document.getElementById('contact-link');
      const modal = document.getElementById('wechat-modal');
      const close = document.getElementById('wechat-modal-close');
      const title = document.getElementById('wechat-modal-title');
      const body = document.getElementById('wechat-modal-body');
      const image = document.getElementById('wechat-modal-image');
      if (!link || !modal || !close || !title || !body || !image) return;

      title.textContent = strings.thank_you_wechat_modal_title || 'Add me on WeChat';
      body.textContent = strings.thank_you_wechat_modal_body || 'Scan this QR code in WeChat to contact me directly.';
      image.alt = strings.thank_you_wechat_modal_alt || 'WeChat QR code';

      link.onclick = event => {
        if (!link.dataset.modalImage) return;
        event.preventDefault();
        image.src = link.dataset.modalImage;
        modal.hidden = false;
        close.focus();
      };

      close.onclick = () => closeWeChatModal();
      modal.onclick = event => {
        if (event.target === modal) closeWeChatModal();
      };
      document.onkeydown = event => {
        if (event.key === 'Escape' && !modal.hidden) closeWeChatModal();
      };
    }

    function closeWeChatModal() {
      const modal = document.getElementById('wechat-modal');
      const link = document.getElementById('contact-link');
      if (modal) modal.hidden = true;
      if (link) link.focus();
    }

    init();
  </script>
</body>
</html>
