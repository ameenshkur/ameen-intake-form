<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500&family=Noto+Kufi+Arabic:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --accent: #0d9488;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .check-icon {
      width: 56px;
      height: 56px;
      background: #ccfbf1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check-icon svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--text);
    }

    .body-text {
      color: var(--muted);
      font-size: 15px;
      max-width: 460px;
      margin: 0 auto 24px;
    }

    .signature {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--border);
      margin: 32px auto;
      border-radius: 2px;
    }

    @media (min-width: 768px) {
      body {
        font-size: 18px;
        padding: 56px 32px;
      }

      .card {
        max-width: 680px;
      }

      .check-icon {
        width: 68px;
        height: 68px;
        margin-bottom: 34px;
      }
      .check-icon svg {
        width: 32px;
        height: 32px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 24px;
      }

      .body-text {
        font-size: 18px;
        max-width: 560px;
        margin-bottom: 28px;
      }

      .signature {
        font-size: 19px;
      }

      .divider {
        width: 56px;
        margin: 40px auto;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 id="ty-title"></h1>
    <p class="body-text" id="ty-body"></p>
    <div class="divider"></div>
    <p class="signature" id="ty-signature"></p>
  </div>

  <script>
    const LANGS = { en: {}, ar: {}, zh: {} };

    async function init() {
      const params = new URLSearchParams(window.location.search);
      let lang = params.get('lang') || localStorage.getItem('intake_lang') || 'en';
      if (!['en', 'ar', 'zh'].includes(lang)) lang = 'en';

      let strings = {};
      try {
        const res = await fetch(`assets/lang/${lang}.json`);
        strings = await res.json();
      } catch {
        try {
          const res = await fetch('assets/lang/en.json');
          strings = await res.json();
        } catch { /* use fallback text */ }
      }

      const meta = strings._meta || {};
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', meta.dir || 'ltr');
      document.body.style.fontFamily = meta.font_family || "'Outfit', sans-serif";
      document.title = strings.thank_you_title || 'Thank You';

      document.getElementById('ty-title').textContent =
        strings.thank_you_title || 'Thank you — your intake is received.';
      document.getElementById('ty-body').textContent =
        strings.thank_you_body || "I'll review everything carefully and come back to you soon.";
      document.getElementById('ty-signature').textContent =
        strings.thank_you_signature || '— Ameen';
    }

    init();
  </script>
</body>
</html>
