<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --accent: #0d9488;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --font-body: 'Outfit', sans-serif;
      --font-heading: 'Syne', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
    }

    .card {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    .check-icon {
      width: 56px;
      height: 56px;
      background: #ccfbf1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check-icon svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--text);
    }

    .body-text {
      color: var(--muted);
      font-size: 15px;
      max-width: 460px;
      margin: 28px auto 14px;
    }

    .signature {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--border);
      margin: 24px auto 0;
      border-radius: 2px;
    }

    .next-steps {
      margin-top: 24px;
      text-align: start;
    }

    .next-steps h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      line-height: 1.3;
      text-align: center;
      margin-bottom: 18px;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .step-card {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 16px;
      align-items: center;
      min-height: 132px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    .step-card.is-complete {
      border-color: rgba(13, 148, 136, 0.45);
      background: #f7fffd;
      box-shadow: 0 12px 28px rgba(13, 148, 136, 0.08);
    }

    .step-illustration {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      overflow: hidden;
    }

    .step-illustration img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      display: block;
    }

    .step-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .step-dot {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 999px;
      background: #ccfbf1;
      color: var(--accent);
      font-size: 12px;
      line-height: 1;
    }

    .is-complete .step-dot {
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }

    .step-card h3 {
      font-family: var(--font-heading);
      font-size: 17px;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .step-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (min-width: 768px) {
      body {
        font-size: 18px;
        padding: 24px 40px;
      }

      .card {
        max-width: 1040px;
      }

      .check-icon {
        width: 58px;
        height: 58px;
        margin-bottom: 18px;
      }
      .check-icon svg {
        width: 28px;
        height: 28px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 14px;
      }

      .body-text {
        font-size: 17px;
        line-height: 1.5;
        max-width: 760px;
        margin-top: 22px;
        margin-bottom: 10px;
      }

      .signature {
        font-size: 18px;
      }

      .divider {
        width: 54px;
        margin: 18px auto 0;
      }

      .next-steps {
        margin-top: 18px;
      }

      .next-steps h2 {
        font-size: 22px;
        margin-bottom: 14px;
      }

      .steps-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .step-card {
        grid-template-columns: 1fr;
        align-content: start;
        min-height: 230px;
        padding: 14px;
      }

      .step-illustration {
        aspect-ratio: 16 / 9;
      }

      .step-illustration img {
        width: 78%;
        height: 78%;
      }

      .step-kicker {
        margin-bottom: 5px;
        font-size: 11px;
      }

      .step-card h3 {
        font-size: 18px;
        margin-bottom: 5px;
      }

      .step-card p {
        font-size: 14px;
        line-height: 1.45;
      }
    }

    @media (min-width: 768px) and (max-height: 760px) {
      body {
        align-items: flex-start;
        padding-top: 18px;
        padding-bottom: 18px;
      }

      .check-icon {
        width: 50px;
        height: 50px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 32px;
      }

      .body-text {
        font-size: 16px;
        line-height: 1.42;
        margin-top: 18px;
        margin-bottom: 12px;
      }

      .divider {
        margin: 18px auto;
      }

      .next-steps {
        margin-top: 14px;
      }

      .step-card {
        min-height: 208px;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .step-card {
        grid-template-columns: 76px 1fr;
        gap: 12px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 id="ty-title"></h1>

    <section class="next-steps" aria-labelledby="next-steps-title">
      <h2 id="next-steps-title"></h2>
      <div class="steps-grid">
        <article class="step-card is-complete">
          <div class="step-illustration">
            <img src="assets/img/undraw-digital-signature.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">✓</span>
              <span id="step-1-kicker"></span>
            </div>
            <h3 id="step-1-title"></h3>
            <p id="step-1-body"></p>
          </div>
        </article>
        <article class="step-card">
          <div class="step-illustration">
            <img src="assets/img/undraw-reviewing-design.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">2</span>
              <span id="step-2-kicker"></span>
            </div>
            <h3 id="step-2-title"></h3>
            <p id="step-2-body"></p>
          </div>
        </article>
        <article class="step-card">
          <div class="step-illustration">
            <img src="assets/img/undraw-finding-the-way.svg" alt="" />
          </div>
          <div>
            <div class="step-kicker">
              <span class="step-dot">3</span>
              <span id="step-3-kicker"></span>
            </div>
            <h3 id="step-3-title"></h3>
            <p id="step-3-body"></p>
          </div>
        </article>
      </div>
    </section>

    <div class="divider"></div>
    <p class="body-text" id="ty-body"></p>
    <p class="signature" id="ty-signature"></p>
  </div>

  <script>
    const LANGS = { en: {}, ar: {}, zh: {} };

    async function init() {
      const params = new URLSearchParams(window.location.search);
      let lang = params.get('lang') || localStorage.getItem('intake_lang') || 'en';
      if (!['en', 'ar', 'zh'].includes(lang)) lang = 'en';

      let strings = {};
      try {
        const res = await fetch(`assets/lang/${lang}.json`);
        strings = await res.json();
      } catch {
        try {
          const res = await fetch('assets/lang/en.json');
          strings = await res.json();
        } catch { /* use fallback text */ }
      }

      const meta = strings._meta || {};
      const bodyFont = meta.font_family || "'Outfit', sans-serif";
      const headingFont = lang === 'en' ? "'Syne', sans-serif" : bodyFont;
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', meta.dir || 'ltr');
      document.documentElement.style.setProperty('--font-body', bodyFont);
      document.documentElement.style.setProperty('--font-heading', headingFont);
      document.body.style.fontFamily = bodyFont;
      document.title = strings.thank_you_title || 'Thank You';

      document.getElementById('ty-title').textContent =
        strings.thank_you_title || 'Thank you — your intake is received.';
      document.getElementById('ty-body').textContent =
        strings.thank_you_body || "We'll review everything carefully and come back to you soon.";
      document.getElementById('ty-signature').textContent =
        strings.thank_you_signature || '— Ameen / امين / ئەمین / 阿明';

      document.getElementById('next-steps-title').textContent =
        strings.thank_you_steps_title || 'What happens next';
      const steps = [
        {
          kicker: strings.thank_you_step_1_kicker || 'Completed',
          title: strings.thank_you_step_1_title || 'Intake form submitted',
          body: strings.thank_you_step_1_body || 'Your answers are safely received and ready for review.'
        },
        {
          kicker: strings.thank_you_step_2_kicker || 'Next',
          title: strings.thank_you_step_2_title || 'Marketing strategy review',
          body: strings.thank_you_step_2_body || 'We study your intake to understand the market, audience, and goals, then follow up if anything needs clarification.'
        },
        {
          kicker: strings.thank_you_step_3_kicker || 'Then',
          title: strings.thank_you_step_3_title || 'Strategy direction',
          body: strings.thank_you_step_3_body || 'Once the details are clear, we outline the strongest next direction for your market entry or growth plan.'
        }
      ];

      steps.forEach((step, index) => {
        const number = index + 1;
        document.getElementById(`step-${number}-kicker`).textContent = step.kicker;
        document.getElementById(`step-${number}-title`).textContent = step.title;
        document.getElementById(`step-${number}-body`).textContent = step.body;
      });
    }

    init();
  </script>
</body>
</html>
